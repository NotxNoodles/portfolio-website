<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-header">
        <h1>AQ<span class="accent">.</span></h1>
        <p>Admin Panel</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard" style="display:none;">
    <header class="dash-header">
      <div class="dash-header-inner">
        <h1 class="dash-logo">AQ<span class="accent">.</span> <span class="dash-label">Admin</span></h1>
        <div class="dash-header-actions">
          <a href="/" class="btn btn-outline btn-sm">View Site</a>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </header>

    <main class="dash-main">
      <div class="dash-container">
        <div class="dash-title-row">
          <h2>Projects</h2>
          <button class="btn btn-primary btn-sm" id="addProjectBtn">+ Add Project</button>
        </div>

        <!-- Project Form Modal -->
        <div class="modal-overlay" id="modalOverlay" style="display:none;">
          <div class="modal">
            <div class="modal-header">
              <h3 id="modalTitle">Add Project</h3>
              <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="projectForm">
              <input type="hidden" id="projectId">
              <div class="form-group">
                <label for="projTitle">Title</label>
                <input type="text" id="projTitle" required>
              </div>
              <div class="form-group">
                <label for="projDescription">Description</label>
                <textarea id="projDescription" rows="3" required></textarea>
              </div>
              <div class="form-group">
                <label for="projImageUrl">Image URL</label>
                <input type="url" id="projImageUrl" placeholder="https://...">
              </div>
              <div class="form-group">
                <label for="projTags">Tech Tags <span class="hint">(comma-separated)</span></label>
                <input type="text" id="projTags" placeholder="Python, React, Node.js">
              </div>
              <div class="form-group">
                <label for="projCategory">Category</label>
                <input type="text" id="projCategory" placeholder="e.g. Web App, CLI Tool">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="projGithub">GitHub URL</label>
                  <input type="url" id="projGithub" placeholder="https://github.com/...">
                </div>
                <div class="form-group">
                  <label for="projLive">Live URL</label>
                  <input type="url" id="projLive" placeholder="https://...">
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btn btn-outline" id="formCancel">Cancel</button>
                <button type="submit" class="btn btn-primary" id="formSubmit">Save Project</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Project List -->
        <div class="project-list" id="projectList">
          <p class="loading-text">Loading projects...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
